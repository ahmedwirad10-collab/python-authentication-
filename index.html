<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Test Backend</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto; }
    input { padding: 8px; width: 320px; max-width: 100%; margin-top: 6px; }
    button { padding: 10px 14px; margin-top: 12px; cursor: pointer; }
    .section { margin-bottom: 28px; }
    .row { margin: 8px 0; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="section">
    <h2>Register User</h2>

    <form id="registerForm">
      <div class="row">
        <input type="text" id="registerUsername" placeholder="Enter Username" required />
      </div>
      <div class="row">
        <input type="email" id="registerEmail" placeholder="Enter Email" required />
      </div>
      <div class="row">
        <input type="password" id="registerPassword" placeholder="Enter Password" required />
      </div>
      <button type="submit">Register</button>
      <div class="muted">POST /register (expects username, email, password)</div>
    </form>
  </div>

  <div class="section">
    <h2>Login</h2>

    <form id="loginForm">
      <div class="row">
        <input type="email" id="loginEmail" placeholder="Enter Email" required />
      </div>
      <div class="row">
        <input type="password" id="loginPassword" placeholder="Enter Password" required />
      </div>
      <button type="submit">Login</button>
      <div class="muted">POST /login (expects email, password)</div>
    </form>
  </div>

  <h3>Response:</h3>
  <pre id="response"></pre>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    function setResponse(data) {
      document.getElementById("response").innerText = JSON.stringify(data, null, 2);
    }

    async function postJson(path, body) {
      const res = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });

      const contentType = res.headers.get("content-type") || "";
      const data = contentType.includes("application/json") ? await res.json() : { message: await res.text() };

      if (!res.ok) {
        // Normalize to something readable in the UI
        return { ok: false, status: res.status, error: data?.detail ?? data };
      }
      return { ok: true, status: res.status, data };
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("registerUsername").value;
      const email = document.getElementById("registerEmail").value;
      const password = document.getElementById("registerPassword").value;

      const result = await postJson("/register", { username, email, password });
      setResponse(result);
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      const result = await postJson("/login", { email, password });
      setResponse(result);
    });
  </script>
</body>
</html>
